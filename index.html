<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水鏡廊苑 - Visual Cooling Experience</title>
    <style>
        :root {
            --metal-silver: #d1d1d1;
            --water-deep: #0a0f14;
            --zen-white: #f5f5f5;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--water-deep);
            font-family: 'Times New Roman', serif;
        }

        /* 空間背景層 */
        #space-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./zen-bg.png') no-repeat center center; 
            background-size: cover;
            filter: saturate(0.8) brightness(0.9);
            transition: filter 2s ease;
            z-index: 1;
        }

        /* 角色圖層 */
        #character-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .character-container {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
        }

        /* 新增：正中央的主角色 char.png */
        #char-center-wrap {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; /* Q 版尺寸 */
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            animation: breathAnime 4s ease-in-out infinite;
        }

        @keyframes breathAnime {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -55%) scale(1.05); opacity: 1; }
        }

        /* 方案 A: 泡泡角色 */
        #char-bubble-wrap {
            bottom: 25%;
            left: 10%;
            width: 150px;
            animation: floatBubble 5s ease-in-out infinite;
        }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* 方案 B: 水面角色 */
        #char-floor-wrap {
            bottom: 12%;
            right: 15%;
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: waterSway 8s ease-in-out infinite;
        }

        .char-main {
            width: 100%;
            position: relative;
            z-index: 2;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, rgba(0,0,0,0.5) 100%);
            mask-image: linear-gradient(to bottom, black 85%, rgba(0,0,0,0.5) 100%);
        }

        .char-reflection {
            width: 100%;
            transform: scaleY(-0.8) translateY(-10px);
            filter: blur(4px) brightness(0.5) opacity(0.4);
            margin-top: -5px;
            z-index: 1;
        }

        @keyframes waterSway {
            0%, 100% { transform: translateX(0) rotate(0.5deg); }
            50% { transform: translateX(5px) rotate(-0.5deg); }
        }

        /* 水波紋畫布層 */
        #ripple-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: crosshair;
        }

        /* UI 界面層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .header {
            border-left: 1px solid var(--metal-silver);
            padding-left: 15px;
            color: var(--metal-silver);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 14px;
            pointer-events: auto;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--metal-silver);
            font-size: 12px;
            letter-spacing: 2px;
        }

        .cool-down-btn {
            pointer-events: auto;
            border: 1px solid var(--metal-silver);
            background: rgba(255, 255, 255, 0.05);
            color: var(--metal-silver);
            padding: 10px 25px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.5s;
        }

        .cool-down-btn:hover {
            background: var(--metal-silver);
            color: var(--water-deep);
        }
    </style>
</head>
<body>

    <div id="space-background"></div>
    
    <canvas id="ripple-canvas"></canvas>

    <div id="character-layer">
        <!-- 中央主角色 (char.png) -->
        <div id="char-center-wrap" class="character-container">
            <img src="char.png" alt="Center Sprite" style="width:100%">
        </div>

        <!-- 方案 A (charbubble.png) -->
        <div id="char-bubble-wrap" class="character-container">
            <img src="charbubble.png" alt="Bubble Sprite" style="width:100%">
        </div>

        <!-- 方案 B (charfloor.png) -->
        <div id="char-floor-wrap" class="character-container">
            <img src="charfloor.png" class="char-main" alt="Floor Sprite">
            <img src="charfloor.png" class="char-reflection" alt="Reflection">
        </div>
    </div>

    <div id="ui-layer">
        <div class="header">
            <div>L'ÉCHELLE DE LA SÉRÉNITÉ</div>
            <div style="font-size: 10px; opacity: 0.6;">ZENITH FRENCH MODERNISM</div>
        </div>

        <div class="footer">
            <div id="status">STATUS: COOLING...</div>
            <button class="cool-down-btn" onclick="toggleCooling()">DEEP MEDITATION</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ripple-canvas');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('space-background');
        const statusText = document.getElementById('status');
        
        const centerChar = document.getElementById('char-center-wrap');
        const bubbleChar = document.getElementById('char-bubble-wrap');
        const floorChar = document.getElementById('char-floor-wrap');

        let width, height;
        let ripples = [];
        let isDeep = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', init);
        init();

        class Ripple {
            constructor(x, y, size = 150) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = size;
                this.opacity = 0.5;
                this.speed = 1.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(200, 210, 220, ${this.opacity})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();
            }

            update() {
                this.radius += this.speed;
                this.opacity -= 0.005;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ripples = ripples.filter(r => r.opacity > 0);
            ripples.forEach(r => {
                r.update();
                r.draw();
            });
            requestAnimationFrame(animate);
        }

        // 畫布背景點擊
        window.addEventListener('mousedown', (e) => {
            ripples.push(new Ripple(e.clientX, e.clientY));
        });

        // 點擊中央角色 (char.png)：產生向外擴散的大型漣漪
        centerChar.addEventListener('click', (e) => {
            e.stopPropagation();
            // 產生多重強力波紋
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    ripples.push(new Ripple(window.innerWidth/2, window.innerHeight/2, 300));
                }, i * 100);
            }
        });

        // 點擊泡泡角色 (charbubble.png)
        bubbleChar.addEventListener('click', (e) => {
            e.stopPropagation();
            bubbleChar.style.transition = 'transform 0.3s ease-out';
            bubbleChar.style.transform = 'translateY(-80px) scale(1.1)';
            
            for(let i=0; i<2; i++) {
                setTimeout(() => {
                    ripples.push(new Ripple(e.clientX, e.clientY, 120));
                }, i * 200);
            }

            setTimeout(() => {
                bubbleChar.style.transform = 'translateY(0) scale(1)';
            }, 600);
        });

        // 點擊地面角色 (charfloor.png)
        floorChar.addEventListener('click', (e) => {
            e.stopPropagation();
            bg.style.filter = "saturate(0.2) brightness(0.7) contrast(1.1)";
            ripples.push(new Ripple(e.clientX, e.clientY, 180));
            
            setTimeout(() => {
                bg.style.filter = isDeep ? "saturate(0) brightness(0.6)" : "saturate(0.8) brightness(0.9)";
            }, 1000);
        });

        function toggleCooling() {
            if(!isDeep) {
                bg.style.filter = "saturate(0) brightness(0.6) hue-rotate(10deg)";
                statusText.innerText = "STATUS: DEEP ZEN";
                isDeep = true;
            } else {
                bg.style.filter = "saturate(0.8) brightness(0.9)";
                statusText.innerText = "STATUS: COOLING...";
                isDeep = false;
            }
        }

        animate();
    </script>
</body>
</html>
